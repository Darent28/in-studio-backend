# Load environment variables from .env (optional)
spring.config.import=optional:dotenv:

spring.application.name=in-studio

# Server configuration
server.port=${SERVER_PORT:8080}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081}

# Datasource — all connection details via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Schema init only (no data.sql)
spring.sql.init.mode=always
spring.sql.init.data-locations=
spring.sql.init.separator=;;

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Resend email API
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:onboarding@resend.dev}

# Email confirmation
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.cron-secret=${CRON_SECRET}
app.confirmation-token-expiry-hours=${CONFIRMATION_TOKEN_EXPIRY_HOURS:24}

# Stripe
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
